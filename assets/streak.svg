<svg width="495" height="195" viewBox="0 0 495 195" xmlns="http://www.w3.org/2000/svg">
<style>
  text { font-family: "Segoe UI", Ubuntu, sans-serif; }
  .title { font-size: 14px; font-weight: 700; fill: #60A5FA; }
  .label { font-size: 12px; fill: #4A6A9E; }
  .value { font-size: 13px; font-weight: 600; fill: #C8D8F8; }
  .sub   { font-size: 11px; fill: #4A6A9E; }
</style>
<rect width="495" height="195" rx="12" fill="#01000E"/>
<rect x="1" y="1" width="493" height="193" rx="11" fill="#05061A" stroke="#0D1535" stroke-width="1"/>
<text x="247" y="32" class="title" text-anchor="middle">GitHub Streak</text>
<line x1="25" y1="42" x2="470" y2="42" stroke="#0D1535" stroke-width="0.5"/>
<text x="83" y="108" font-family="Segoe UI,Ubuntu,sans-serif" font-size="30" font-weight="700" fill="#3B82F6" text-anchor="middle">440</text>
<text x="83" y="138" class="sub" text-anchor="middle">Total Contributions</text>
<circle cx="83" cy="175" r="3" fill="#3B82F6" opacity="0.5"/>
